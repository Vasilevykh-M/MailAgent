name: mail-agent

services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mail_agent
      POSTGRES_USER: mail_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the environment}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mail_agent -d mail_agent"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [data]

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in the environment}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in the environment}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -fsS http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [data]

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in the environment}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in the environment}
      S3_BUCKET: ${S3_BUCKET:-mail-agent}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "local/$${S3_BUCKET}" &&
        mc anonymous set none "local/$${S3_BUCKET}"
    networks: [data]

  api-service:
    build:
      context: ./api-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://mail_agent:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the environment}@postgres:5432/mail_agent
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in the environment}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in the environment}
      S3_BUCKET: ${S3_BUCKET:-mail-agent}
      S3_REGION: us-east-1
      S3_SECURE: "false"
      WRITER_API_KEY: ${WRITER_API_KEY:?set WRITER_API_KEY in the environment}
      READER_API_KEY: ${READER_API_KEY:?set READER_API_KEY in the environment}
      ALLOW_ANONYMOUS_READER: ${ALLOW_ANONYMOUS_READER:-false}
      MAX_MESSAGE_BYTES: ${MAX_MESSAGE_BYTES:-26214400}
      MAX_ATTACHMENT_BYTES: ${MAX_ATTACHMENT_BYTES:-26214400}
      MAX_ATTACHMENTS_PER_MESSAGE: ${MAX_ATTACHMENTS_PER_MESSAGE:-30}
      PARTITIONS_MONTHS_AHEAD: ${PARTITIONS_MONTHS_AHEAD:-3}
      LOG_LEVEL: ${API_LOG_LEVEL:-INFO}
    ports:
      - target: 8080
        published: "${RESULTS_API_PORT:-8080}"
        host_ip: "${RESULTS_API_HOST:-127.0.0.1}"
        protocol: tcp
    networks: [data]

networks:
  data:
    driver: bridge
    internal: true

volumes:
  postgres-data:
  minio-data:
