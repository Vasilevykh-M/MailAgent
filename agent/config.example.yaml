work_dir: ./var/mail-agent
db_path: ./var/mail-agent/state.sqlite3
checkpoint_db_path: ./var/mail-agent/checkpoints.sqlite3
mail_env_file: ./yandex/mail/.env
pipeline_version: "3"
mail:
  mailbox: INBOX
  poll_interval_seconds: 60
  unread_only: true
  batch_size: 50
  max_concurrent_messages: 1
  mark_read_after_success: true
llm:
  base_url: http://192.168.88.251:8001/v1
  model: qwen3.5-9b
  # Количество попыток получить итоговую сводку до сокращённого fallback.
  final_summary_attempts: 3
  # Общий лимит текста письма и вложений в одном запросе к vLLM.
  max_text_chars_per_request: 6000
  max_completion_tokens: 1000
  # Коррекция OCR возвращает текст целиком, поэтому её лимит выше общего.
  max_ocr_correction_tokens: 1000
  max_image_bytes_per_request: 4194304
  # Общий предел логических structured-вызовов LLM на одно письмо.
  max_structured_requests_per_message: 256
ocr:
  base_url: http://192.14.88.2:8000
  # При ошибке OCR попытаться извлечь PDF/изображения через VLM.
  fallback_to_vlm: true
  # Это число повторов после первой попытки: всего будет не более двух запросов OCR.
  max_retries: 1
results_api:
  base_url: http://127.0.0.1:8080
  # Ключ остаётся пустым: передавайте RESULTS_API_KEY только через окружение.
  api_key: ""
  timeout_seconds: 300
  max_retries: 3
  verify_tls: true
limits:
  max_attachment_size: 26214400
  max_attachments_per_message: 30
  max_pdf_pages: 50
  max_pptx_slides: 100
  max_xlsx_sheets: 20
  max_xlsx_rows: 10000
  max_xlsx_columns: 100
  max_parallel_attachments: 1
  # Размер фрагмента вложения для поэтапной суммаризации.
  chunk_size: 4000
  max_attachment_summary_chunks: 24
  # Обычное тело письма длиннее этого значения суммаризируется по фрагментам.
  message_body_chunk_size: 3000
  max_message_body_summary_chunks: 24
  # Общий лимит фрагментов по всем уровням цепочки пересылки.
  max_forwarded_summary_chunks: 24
dashboard:
  # Для trusted LAN можно указать private/VPN IP сервера, например 192.168.88.32.
  # Публичные адреса и 0.0.0.0 запрещены.
  host: 127.0.0.1
  port: 8765
  queue_limit: 100
  recent_limit: 30
